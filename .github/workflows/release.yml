name: Release Metadata

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  validate-and-update-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Derive release metadata
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.payload.release.tag_name;
            if (!/^v\d+\.\d+\.\d+$/.test(tag)) {
              core.setFailed(`Release tag must look like vX.Y.Z, got ${tag}`);
              return;
            }

            core.setOutput("tag", tag);
            core.setOutput("version", tag.slice(1));
            core.setOutput("version_pattern", `version = "${tag.slice(1)}"`);
            core.setOutput("readme_pattern", `rev = "${tag}"`);

      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: Validate tagged files
        shell: bash
        run: |
          VERSION_PATTERN="${{ steps.meta.outputs.version_pattern }}"
          README_PATTERN="${{ steps.meta.outputs.readme_pattern }}"

          python - <<'PY'
          import os
          import pathlib

          version_pattern = os.environ["VERSION_PATTERN"]
          readme_pattern = os.environ["README_PATTERN"]

          manifest_path = pathlib.Path("loom.config.luau")
          manifest = manifest_path.read_text()
          if version_pattern not in manifest:
              raise SystemExit(
                  f"Tagged commit is out of sync: expected {version_pattern!r} in {manifest_path}"
              )

          readme_path = pathlib.Path("README.md")
          readme = readme_path.read_text()
          if readme_pattern not in readme:
              raise SystemExit(
                  f'Tagged commit is out of sync: expected {readme_pattern!r} in {readme_path}'
              )
          PY
        env:
          VERSION_PATTERN: ${{ steps.meta.outputs.version_pattern }}
          README_PATTERN: ${{ steps.meta.outputs.readme_pattern }}

      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const release = context.payload.release;

            const generated = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: release.tag_name,
              target_commitish: release.target_commitish || context.payload.repository.default_branch,
            });

            const existing = (release.body || "").trim();
            const generatedBody = (generated.data.body || "").trim();
            const body = existing.length > 0
              ? `${existing}\n\n---\n\n${generatedBody}`
              : generatedBody;

            core.setOutput("body", body);

      - name: Update release description
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ steps.notes.outputs.body }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: process.env.RELEASE_BODY,
            });
