name: Release Metadata

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  sync-version-and-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Derive release metadata
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.payload.release.tag_name;
            if (!/^v\d+\.\d+\.\d+$/.test(tag)) {
              core.setFailed(`Release tag must look like vX.Y.Z, got ${tag}`);
              return;
            }

            core.setOutput("tag", tag);
            core.setOutput("version", tag.slice(1));
            core.setOutput("default_branch", context.payload.repository.default_branch);

      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.default_branch }}

      - name: Sync versioned files
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="${{ steps.meta.outputs.tag }}"

          python - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]

          manifest_path = pathlib.Path("loom.config.luau")
          manifest = manifest_path.read_text()
          manifest_updated, manifest_count = re.subn(r'version = "[^"]+"', f'version = "{version}"', manifest, count=1)

          if manifest_count != 1:
              raise SystemExit("Could not find package.version in loom.config.luau")

          manifest_path.write_text(manifest_updated)

          readme_path = pathlib.Path("README.md")
          readme = readme_path.read_text()
          readme_updated, readme_count = re.subn(r'rev = "v[^"]+"', f'rev = "{tag}"', readme, count=1)

          if readme_count != 1:
              raise SystemExit('Could not find README install example rev = "v..."')

          readme_path.write_text(readme_updated)
          PY
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}

      - name: Commit synced version
        shell: bash
        run: |
          if git diff --quiet -- loom.config.luau README.md; then
            echo "versioned files already match release metadata"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add loom.config.luau README.md
          git commit -m "release: sync version to ${{ steps.meta.outputs.version }}"
          git push origin HEAD:${{ steps.meta.outputs.default_branch }}

      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const release = context.payload.release;

            const generated = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: release.tag_name,
              target_commitish: release.target_commitish || context.payload.repository.default_branch,
            });

            const existing = (release.body || "").trim();
            const generatedBody = (generated.data.body || "").trim();
            const body = existing.length > 0
              ? `${existing}\n\n---\n\n${generatedBody}`
              : generatedBody;

            core.setOutput("body", body);

      - name: Update release description
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ steps.notes.outputs.body }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: process.env.RELEASE_BODY,
            });
